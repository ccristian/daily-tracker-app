name: offline_daily_tracker
description: Offline daily activity tracker with streaks, slider scales, and optional PIN lock.
publish_to: "none"
version: 0.0.1+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  sqflite: ^2.4.1
  sqflite_common_ffi_web: ^1.0.1
  path: ^1.9.1
  intl: ^0.20.2
  flutter_secure_storage: ^9.2.4
  crypto: ^3.0.6
  flutter_local_notifications: ^19.4.0
  timezone: ^0.10.1
  flutter_timezone: ^4.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
